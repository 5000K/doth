name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Update version file
        run: |
          echo "${{ github.ref_name }}" > model/_version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model/_version.txt
          git commit -m "release pipeline: update version tag"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Get module name
        run: echo "MODULE_NAME=$(go list -m)" >> $GITHUB_ENV

      - name: Build binaries
        run: |
          mkdir -p dist
          cp model/_version.txt dist/version.txt

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "linux/arm"
            "darwin/amd64"
            "darwin/arm64"
          )

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi
            output="doth-${os}-${arch}${ext}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -ldflags="-s -w" -o "dist/$output" .
            chmod +x "dist/$output"
            echo "Built: dist/$output"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
